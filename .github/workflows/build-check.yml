# main 직접 푸시 체제의 사후 안전판 — 검증 불가 환경(클라우드 세션 등)에서 온 커밋도 빌드는 여기서 반드시 검증된다 (git-flow.md)
name: Build check

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm build
